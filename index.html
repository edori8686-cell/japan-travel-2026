<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 교토·오사카 여행 일정</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --c1: #3b82f6;
      --c2: #22c55e;
      --c3: #f97316;
      --c4: #ef4444;
      --c5: #a855f7;
      --bg: #f4f3ef;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2ddd8;
      --header-h: 52px;
      --tabs-h: 46px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────── */
    header {
      height: var(--header-h);
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 200;
    }
    header .flag { font-size: 22px; }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    header .meta { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.45); }

    /* ─── MAIN SPLIT ─────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── MAP ────────────────────────────── */
    #map {
      width: 55%;
      flex-shrink: 0;
      height: 100%;
      z-index: 1;
    }

    /* ─── TIMELINE PANEL ─────────────────── */
    .timeline-panel {
      width: 45%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* ─── DAY TABS ───────────────────────── */
    .day-tabs {
      height: var(--tabs-h);
      display: flex;
      background: #1e293b;
      flex-shrink: 0;
    }

    .day-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .day-tab:hover { color: rgba(255,255,255,0.75); }
    .day-tab.active { color: white; border-bottom-color: var(--tab-color, white); }
    .day-tab .d-num { font-size: 13px; font-weight: 800; }
    .day-tab .d-date { font-size: 9px; opacity: 0.7; }

    /* ─── SCROLLABLE CONTENT ─────────────── */
    .timeline-scroll {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 38vh 16px 40vh;
    }
    .timeline-scroll::-webkit-scrollbar { width: 4px; }
    .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── DAY SECTION ────────────────────── */
    .day-section { margin-bottom: 4px; }

    .day-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 18px 0 7px;
      margin-bottom: 2px;
    }
    .day-badge {
      font-size: 10px; font-weight: 800; color: white;
      background: var(--badge-color, #888);
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .day-header-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .day-info { display: flex; align-items: baseline; gap: 5px; flex-shrink: 0; }
    .day-info .day-title { font-size: 11px; font-weight: 700; color: var(--text); }
    .day-info .day-date  { font-size: 10px; color: var(--muted); }

    /* ─── TIMELINE TRACK ─────────────────── */
    .timeline-track {
      position: relative;
      padding-left: 20px;
    }
    .timeline-track::before {
      content: '';
      position: absolute;
      left: 5px; top: 8px; bottom: 8px;
      width: 2px;
      background: linear-gradient(to bottom, var(--track-color, #ddd), transparent);
      opacity: 0.4;
    }

    /* ─── TRANSPORT ANIMATION ───────────── */
    .transport-icon {
      background: none !important;
      border: none !important;
      pointer-events: none;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
      animation: transport-bounce 0.4s ease infinite alternate;
    }
    @keyframes transport-bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-3px) scale(1.1); }
    }

    /* ─── TIMELINE ITEM ──────────────────── */
    .timeline-item {
      position: relative;
      margin-bottom: 6px;
      cursor: pointer;
    }

    /* dot on the track */
    .tl-dot {
      position: absolute;
      left: -20px;
      top: 16px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--item-color);
      border: 2px solid white;
      box-shadow: 0 0 0 1.5px var(--item-color);
      transition: transform 0.25s, box-shadow 0.25s;
      z-index: 2;
    }
    .timeline-item.active .tl-dot {
      transform: scale(1.5);
      box-shadow: 0 0 0 2px var(--item-color), 0 0 10px var(--item-color-alpha, rgba(0,0,0,0.2));
    }

    /* card */
    .tl-card {
      background: var(--card);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s;
    }
    .timeline-item:hover .tl-card { transform: translateX(2px); }
    .timeline-item.active .tl-card {
      border-color: var(--item-color);
      box-shadow: 0 3px 16px -4px var(--item-color-alpha, rgba(0,0,0,0.2));
    }

    /* card header (always visible) */
    .tl-head {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      gap: 8px;
    }
    .tl-time {
      font-size: 10px;
      font-weight: 700;
      color: var(--item-color);
      min-width: 36px;
      font-variant-numeric: tabular-nums;
    }
    .tl-title {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      line-height: 1.4;
    }
    .tl-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--item-color);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .timeline-item.active .tl-num { opacity: 1; }
    .tl-chevron {
      font-size: 9px;
      color: var(--muted);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .timeline-item.expanded .tl-chevron { transform: rotate(180deg); }

    /* expandable details */
    .tl-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .timeline-item.expanded .tl-details { max-height: 300px; }

    .tl-details-inner {
      border-top: 1px solid var(--border);
      padding: 10px 12px 10px 56px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.75;
    }
    .tl-desc { margin-bottom: 8px; }
    .tl-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tl-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--item-color);
      border: 1px solid var(--item-color);
      opacity: 0.75;
    }

    /* ─── MAP ATTRIBUTION FIX ────────────── */
    .leaflet-control-attribution { font-size: 9px !important; }

    /* ─── THUMBNAIL ─────────────────────── */
    .tl-thumb-wrap { float: left; margin: 0 10px 6px 0; flex-shrink: 0; }
    .tl-thumb {
      width: 76px; height: 76px; border-radius: 8px;
      object-fit: cover; display: block; cursor: zoom-in;
      background: var(--border);
      transition: transform 0.2s, opacity 0.3s;
    }
    .tl-thumb:hover { transform: scale(1.04); }
    .tl-title-btn {
      background: none; border: none; padding: 0;
      font: inherit; text-align: left; cursor: pointer;
      font-size: 13px; font-weight: 600; flex: 1; line-height: 1.4;
      color: #60a5fa;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(96,165,250,0.4);
    }
    .tl-title-btn:hover,
    .timeline-item.active .tl-title-btn { text-decoration-color: #60a5fa; }

    /* ─── LIGHTBOX ───────────────────────── */
    #lightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92);
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 10px; object-fit: contain; }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      color: white; font-size: 28px; cursor: pointer;
      background: none; border: none; line-height: 1;
    }

    /* ─── DETAIL SHEET ────────────────────── */
    #detailSheet {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,.55);
      display: none; align-items: flex-end;
    }
    #detailSheet.open { display: flex; }
    #detailBody {
      width: 100%; background: var(--bg);
      border-radius: 18px 18px 0 0;
      max-height: 82vh; overflow-y: auto;
      animation: slideUp 0.28s cubic-bezier(.32,.72,0,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #detailHero { width: 100%; height: 190px; object-fit: cover; display: none; }
    .detail-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .detail-content { padding: 14px 16px 28px; }
    .detail-title { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
    .detail-time { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .detail-desc { font-size: 13px; line-height: 1.7; color: var(--muted); }
    .detail-actions { display: flex; gap: 8px; margin-top: 18px; }
    .detail-btn {
      flex: 1; padding: 11px; border-radius: 11px; border: 1.5px solid var(--border);
      font-size: 13px; font-weight: 700; cursor: pointer;
      background: var(--card); color: var(--text);
    }
    .detail-btn.primary { background: #2563eb; color: white; border-color: #2563eb; }

    /* ─── MOBILE ─────────────────────────── */
    @media (max-width: 720px) {
      .main { flex-direction: column; }
      #map { width: 100%; height: 42vh; }
      .timeline-panel { width: 100%; height: 58vh; }
    }
  </style>
</head>

// Wikipedia thumbnail lazy-fetch
const _thumbCache = {};
async function fetchWikiThumb(wiki) {
  if (_thumbCache[wiki] !== undefined) return _thumbCache[wiki];
  _thumbCache[wiki] = null;
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki)}`);
    if (r.ok) {
      const d = await r.json();
      _thumbCache[wiki] = d.thumbnail?.source ?? null;
    }
  } catch (_) {}
  return _thumbCache[wiki];
}

//  MARKERS
// ═══════════════════════════════════════════════
const markers = {};   // key → { marker, dayIdx, itemIdx }
let activeKey = null;
let globalNum = 1;

function makeIcon(color, num, active) {
  const s = active ? 34 : 26;
  const fs = active ? 11 : 9;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${s}px;height:${s}px;
      background:${color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2.5px solid white;
      box-shadow:0 2px 8px rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;
    "><span style="transform:rotate(45deg);color:#fff;font-size:${fs}px;font-weight:800;line-height:1">${num}</span></div>`,
    iconSize: [s, s],
    iconAnchor: [s / 2, s],
    popupAnchor: [0, -(s + 4)],
  });
}

ITINERARY.forEach((day, di) => {
  const color = DAY_COLORS[di];
  day.items.forEach((item, ii) => {
    const key = `${di}-${ii}`;
    item._key = key;
    item._num = globalNum++;

    const m = L.marker([item.lat, item.lng], { icon: makeIcon(color, item._num, false), title: item.title })
      .addTo(map)
      .bindTooltip(`<b>${item.title}</b><br><small>${day.date}</small>`, { direction: 'right', offset: [8, 0] });

    m.on('click', () => {
      activateItem(key, true);
    });

    markers[key] = { marker: m, dayIdx: di, itemIdx: ii };
  });
});

// ─── TRANSPORT ANIMATION ────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371e3, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function transportIcon(dist, fromKey) {
  if (fromKey === '0-0') return '✈️';
  if (dist < 700) return '🚶';
  if (dist < 4000) return '🚇';
  return '🚃';
}

let _animMarker = null, _animLine = null;
function clearTransitAnim() {
  if (_animMarker) { map.removeLayer(_animMarker); _animMarker = null; }
  if (_animLine)   { map.removeLayer(_animLine);   _animLine   = null; }
}

function isAdjacent(keyA, keyB) {
  if (!keyA || !keyB) return false;
  const [da, ia] = keyA.split('-').map(Number);
  const [db, ib] = keyB.split('-').map(Number);
  if (da === db) return Math.abs(ia - ib) === 1;
  if (db === da + 1 && ib === 0) return ia === ITINERARY[da].items.length - 1;
  if (da === db + 1 && ia === 0) return ib === ITINERARY[db].items.length - 1;
  return false;
}

function animateTransit(fromItem, toItem, fromKey) {
  clearTransitAnim();
  const dist = haversine(fromItem.lat, fromItem.lng, toItem.lat, toItem.lng);
  const emoji = transportIcon(dist, fromKey);

  _animLine = L.polyline(
    [[fromItem.lat, fromItem.lng], [toItem.lat, toItem.lng]],
    { color: '#aaa', weight: 2, dashArray: '5 7', opacity: 0.7 }
  ).addTo(map);

  _animMarker = L.marker([fromItem.lat, fromItem.lng], {
    icon: L.divIcon({
      className: 'transport-icon',
      html: `<span style="font-size:20px">${emoji}</span>`,
      iconSize: [28, 28], iconAnchor: [14, 14]
    }),
    zIndexOffset: 2000, interactive: false
  }).addTo(map);

  const dur = 1100, start = Date.now();
  const easeInOut = t => t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;
  (function step() {
    const t = Math.min((Date.now() - start) / dur, 1);
    const e = easeInOut(t);
    _animMarker.setLatLng([
      fromItem.lat + (toItem.lat - fromItem.lat) * e,
      fromItem.lng + (toItem.lng - fromItem.lng) * e
    ]);
    if (t < 1) requestAnimationFrame(step);
    else setTimeout(clearTransitAnim, 400);
  })();
}
// ────────────────────────────────────────────────

let _scrollFlyTimer = null;

function flyToItem(key, fromClick = false) {
  const info = markers[key];
  if (!info) return;

  const doFly = () => {
    const item = ITINERARY[info.dayIdx].items[info.itemIdx];
    if (fromClick && activeKey && isAdjacent(activeKey, key)) {
      const prev = markers[activeKey];
      const fromItem = ITINERARY[prev.dayIdx].items[prev.itemIdx];
      animateTransit(fromItem, item, activeKey);
    }
    const zoom = item.lat < 34.6 ? 13 : 15;
    map.flyTo([item.lat, item.lng], zoom, { duration: 1.0, easeLinearity: 0.5 });
  };

  if (fromClick) {
    clearTimeout(_scrollFlyTimer);
    doFly();
  } else {
    clearTimeout(_scrollFlyTimer);
    _scrollFlyTimer = setTimeout(doFly, 180);
  }
}

function setActiveMarker(key) {
  if (activeKey === key) return;
  if (activeKey && markers[activeKey]) {
    const prev = markers[activeKey];
    const prevItem = ITINERARY[prev.dayIdx].items[prev.itemIdx];
    prev.marker.setIcon(makeIcon(DAY_COLORS[prev.dayIdx], prevItem._num, false));
  }
  if (markers[key]) {
    const curr = markers[key];
    const currItem = ITINERARY[curr.dayIdx].items[curr.itemIdx];
    curr.marker.setIcon(makeIcon(DAY_COLORS[curr.dayIdx], currItem._num, true));
  }
  activeKey = key;
}

    el.id = `item-${key}`;
    el.dataset.key = key;

    el.style.setProperty('--item-color-alpha', alpha);

    const hasMeta = !!ITEM_META[key];
    el.innerHTML = `
      <div class="tl-dot"></div>
      <div class="tl-card">
        <div class="tl-head">
          <span class="tl-time">${item.time}</span>
          <button class="tl-title-btn" data-detail="${key}">${item.title}</button>
          <span class="tl-num">${item._num}</span>
          <span class="tl-chevron">▼</span>
        </div>
        <div class="tl-details">
          <div class="tl-details-inner">
            ${hasMeta ? `<div class="tl-thumb-wrap"><img id="thumb-${key}" class="tl-thumb" src="" alt="" style="opacity:0" data-thumb="${key}"></div>` : ''}
            <div class="tl-desc">${item.desc}</div>
            <div class="tl-tags">${tagsHtml}</div>
          </div>
        </div>
      </div>

    el.addEventListener('click', e => {

// ═══════════════════════════════════════════════
//  ACTIVATE ITEM
// ═══════════════════════════════════════════════
let expandedKey = null;
let clickLockUntil = 0;

function activateItem(key, fromClick = false) {
  if (fromClick) clickLockUntil = Date.now() + 1500;
  const di = parseInt(key.split('-')[0]);

  // Update day tabs
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === di));

  // Update timeline item highlight
  document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${key}`);
  if (el) el.classList.add('active');

  // Marker
  setActiveMarker(key);
  flyToItem(key, fromClick);

  // Expand/collapse on click; auto-expand on scroll
  if (fromClick) {
    const isSame = expandedKey === key;
    document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('expanded'));
    if (!isSame) {
      el && el.classList.add('expanded');
      expandedKey = key;
      loadThumbForKey(key);
    } else {
      expandedKey = null;
    }
  } else {
    // scroll-driven: auto-expand current, collapse others
    document.querySelectorAll('.timeline-item').forEach(e => {
      if (e.dataset.key !== key) e.classList.remove('expanded');
    });
    if (el) el.classList.add('expanded');
    expandedKey = key;
    loadThumbForKey(key);
  }
}

// ═══════════════════════════════════════════════
//  INTERSECTION OBSERVER (scroll → map)
// ═══════════════════════════════════════════════
const io = new IntersectionObserver((entries) => {
  // pick the entry with the highest intersectionRatio
  let best = null;
  entries.forEach(e => {
    if (e.isIntersecting) {
      if (!best || e.intersectionRatio > best.intersectionRatio) best = e;
    }
  });
  if (best) {
    const key = best.target.dataset.key;
    if (key && key !== activeKey && Date.now() > clickLockUntil) {
      activateItem(key, false);
    }
  }
}, {
  root: scrollEl,
  rootMargin: '-45% 0px -45% 0px',
  threshold: [0, 0.25, 0.5, 1.0],
});

document.querySelectorAll('.timeline-item').forEach(el => io.observe(el));

// ─── Title button → activate or detail ───────────
scrollEl.addEventListener('click', e => {
  const btn = e.target.closest('.tl-title-btn');
  if (!btn) return;
  e.stopPropagation();
  const key = btn.dataset.detail;
  const info = markers[key];
  if (!info) return;
  if (activeKey === key) {
    openDetail(ITINERARY[info.dayIdx].items[info.itemIdx], key);
  } else {
    activateItem(key, true);
  }
});

// ─── Thumbnail → lightbox ─────────────────────────
scrollEl.addEventListener('click', e => {
  const img = e.target.closest('.tl-thumb');
  if (!img || !img.src || img.style.opacity === '0') return;
  e.stopPropagation();
  openLightbox(img.src);
});

// ─── Fetch wiki thumb on expand ───────────────────
function loadThumbForKey(key) {
  const meta = ITEM_META[key];
  if (!meta?.wiki) return;
  fetchWikiThumb(meta.wiki).then(src => {
    if (!src) return;
    const img = document.getElementById(`thumb-${key}`);
    if (img) { img.src = src; img.style.opacity = '1'; }
    // update hero if detail sheet is open for this item
    const hero = document.getElementById('detailHero');
    if (_ds.classList.contains('open') && hero.style.display === 'none') {
      hero.src = src; hero.style.display = 'block';
    }
  });
}

// ═══════════════════════════════════════════════
//  INITIAL STATE
// ═══════════════════════════════════════════════
setTimeout(() => {
  const firstKey = ITINERARY[0].items[0]._key;
  activateItem(firstKey, false);
  const firstEl = document.getElementById(`item-${firstKey}`);
  if (firstEl) {
    scrollEl.scrollTop = firstEl.offsetTop - (scrollEl.clientHeight - firstEl.offsetHeight) / 2;
  }
}, 400);
